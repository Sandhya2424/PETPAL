{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2 class="mb-4 text-center">Adoption Request for {{ pet.name }}</h2>
      <div class="card p-4 shadow">
        <div class="text-center mb-4">
          <img src="{{ pet.image.url }}" class="img-fluid" style="max-height:300px;">
        </div>
        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-success btn-block mt-3">Submit Request</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
